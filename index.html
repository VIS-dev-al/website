<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Home</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #0070f3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        header {
            border-bottom: 1px solid #eaeaea;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }
        h1 { font-size: 2.5rem; letter-spacing: -0.02em; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { display: flex; flex-direction: column; gap: 1rem; }
        footer { margin-top: 4rem; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>Landing Page</h1>
        <p>A minimalist starter for your web project.</p>
    </header>

    <main class="container">
        <section>
            <h2>Overview</h2>
            <p>This is a default index file. You can use this space to describe your project, link to assets, or provide navigation to other parts of your site.</p>
        </section>

        <section>
            <h2>Quick Links</h2>
            <ul>
                <li><a href="#">Link One</a></li>
                <li><a href="#">Link Two</a></li>
                <li><a href="#">Link Three</a></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>

</body>
</html>
